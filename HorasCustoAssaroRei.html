<style>
:root{--bg:#0a0e17;--surface:#111827;--surface-l:#1a2236;--border:#1e2a42;--border-l:#2a3a56;--accent:#3b82f6;--success:#10b981;--warning:#f59e0b;--danger:#ef4444;--purple:#8b5cf6;--cyan:#06b6d4;--text:#e2e8f0;--text-d:#94a3b8;--text-m:#64748b;--mono:'JetBrains Mono',monospace;--sans:'Space Grotesk',sans-serif}

.search-box{position:relative;margin-bottom:10px}.search-box input{width:100%;padding:9px 12px 9px 34px;background:var(--surface-l);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:13px;outline:none}.search-icon{position:absolute;left:10px;top:10px;color:var(--text-m);font-size:14px}

.value-input{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:10px 14px}.value-input span{font-size:12px;color:var(--text-m);white-space:nowrap}.value-input input{flex:1;padding:5px 8px;background:var(--bg);border:1px solid var(--border);border-radius:5px;color:var(--accent);font-size:14px;font-weight:600;outline:none;font-family:var(--mono);margin:0}
.compare-card{display:grid;grid-template-columns:1fr 1fr;gap:0;margin-bottom:20px;border-radius:11px;overflow:hidden;border:1px solid var(--border)}
.compare-col{padding:20px}.compare-col:first-child{background:var(--surface);border-right:1px solid var(--border)}.compare-col:last-child{background:rgba(59,130,246,.03)}
.compare-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(30,42,66,.15)}.compare-row:last-child{border:none}
.compare-label{font-size:12px;color:var(--text-m)}.compare-val{font-size:14px;font-weight:600;font-family:var(--mono)}

.delta-pos{background:rgba(16,185,129,.12);color:var(--success)}.delta-neg{background:rgba(239,68,68,.12);color:var(--danger)}.delta-zero{background:var(--surface-l);color:var(--text-m)}

.proj-name-edit:hover{border-bottom-color:var(--border-l)}.proj-name-edit:focus{border-bottom-color:var(--accent);background:var(--surface-l);border-radius:4px 4px 0 0}

.sidebar-overlay{display:none}

.sidebar-del{opacity:0;transition:opacity .15s;background:none;border:none;cursor:pointer;color:var(--text-m);font-size:12px;padding:2px 4px;border-radius:4px}.sidebar-del:hover{color:var(--danger);background:rgba(239,68,68,.1)}.sidebar-item:hover .sidebar-del{opacity:1}

function matchName(rn){
  var n=(rn||"").trim().toLowerCase();
  if(!n)return null;
  for(var i=0;i<RES.length;i++)if(RES[i].name.toLowerCase()===n)return RES[i];
  var p12=n.slice(0,12);
  for(var i=0;i<RES.length;i++)if(RES[i].name.toLowerCase().indexOf(p12)===0)return RES[i];
  for(var i=0;i<RES.length;i++)if(p12.indexOf(RES[i].name.toLowerCase().slice(0,12))===0)return RES[i];
  var words=n.split(/\s+/).filter(function(w){return w.length>2;});
  for(var i=0;i<RES.length;i++){var rl=RES[i].name.toLowerCase();var mc=words.filter(function(w){return rl.indexOf(w)>=0;});if(mc.length>=2)return RES[i];}
  return null;
}

/* ===== ROBUST EXCEL PARSER ===== */
function parseXL(data){
  try{
    var wb=XLSX.read(data,{type:"array"});
    var ws=wb.Sheets[wb.SheetNames[0]];
    if(!ws||!ws["!ref"])return null;
    var range=XLSX.utils.decode_range(ws["!ref"]);
    var allRows=[];
    for(var r=range.s.r;r<=range.e.r;r++){var row=[];for(var c=range.s.c;c<=range.e.c;c++){var addr=XLSX.utils.encode_cell({r:r,c:c});var cell=ws[addr];if(cell&&cell.v!==undefined&&cell.v!==null)row[c]=cell.v;}allRows[r]=row;}
    var headerRow=-1,nameCol=-1,hoursCol=-1;
    for(var i=0;i<Math.min(allRows.length,20);i++){if(!allRows[i])continue;for(var j=0;j<=range.e.c;j++){var v=allRows[i][j];if(v&&typeof v==="string"&&v.toLowerCase().indexOf("funcion")>=0){headerRow=i;nameCol=j;break;}}if(headerRow>=0)break;}
    if(headerRow<0)return null;
    var hdr=allRows[headerRow]||[];
    for(var j=0;j<=range.e.c;j++){var v=hdr[j];if(v&&typeof v==="string"){var vl=v.toLowerCase();if(vl.indexOf("efetiva")>=0||vl.indexOf("h.")>=0){hoursCol=j;break;}}}
    if(hoursCol<0)hoursCol=range.e.c;
    var bp={};
    for(var i=headerRow+1;i<allRows.length;i++){var row=allRows[i];if(!row)continue;var nm=row[nameCol];if(!nm||typeof nm!=="string")continue;nm=nm.trim();if(!nm)continue;var hv=row[hoursCol];var hrs=typeof hv==="number"?hv:parseFloat(String(hv).replace(",","."));if(!hrs||hrs<=0)continue;if(!bp[nm])bp[nm]={rn:nm,hours:0,cnt:0};bp[nm].hours+=hrs;bp[nm].cnt++;}
    if(!Object.keys(bp).length)return null;
    return Object.values(bp).map(function(p){var m=matchName(p.rn);return{rn:p.rn,hours:Math.round(p.hours*10)/10,cnt:p.cnt,resourceName:m?m.name:p.rn,rate:m?m.rate:0,role:m?m.role:"NÃO CADASTRADO",matched:!!m};}).sort(function(a,b){return b.hours-a.hours;});
  }catch(e){console.error("parseXL:",e);return null;}
}

/* Forecast month helpers */
var EXPENSE_CATS=["Deslocamento","Gasolina","Pedágio","Hotel","Alimentação","Diária","Outros"];
var MONTH_NAMES=["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
function monthKey(y,m){return y+"-"+String(m+1).padStart(2,"0");}
function monthLbl(key){var p=key.split("-");return MONTH_NAMES[parseInt(p[1])-1]+"-"+p[0].slice(2);}
function getProjectMonths(p){
  if(!p.fcMonths||!p.fcMonths.length){
    // Default: 12 months from now
    var now=new Date(),ms=[];
    for(var i=0;i<12;i++){var d=new Date(now.getFullYear(),now.getMonth()+i,1);ms.push(monthKey(d.getFullYear(),d.getMonth()));}
    p.fcMonths=ms;save();
  }
  return p.fcMonths.map(function(k){return{key:k,lbl:monthLbl(k)};});
}
function addProjectMonth(p,key){
  if(!p.fcMonths)p.fcMonths=[];
  if(p.fcMonths.indexOf(key)>=0)return;
  p.fcMonths.push(key);
  p.fcMonths.sort();
  save();
}
function removeProjectMonth(p,key){
  if(!p.fcMonths)return;
  p.fcMonths=p.fcMonths.filter(function(k){return k!==key;});
  // Also clean up forecast data for this month
  if(p.forecast&&p.forecast.labor){
    Object.keys(p.forecast.labor).forEach(function(res){
      if(p.forecast.labor[res])delete p.forecast.labor[res][key];
    });
  }
  if(p.forecast&&p.forecast.expenses){
    Object.keys(p.forecast.expenses).forEach(function(cat){
      if(p.forecast.expenses[cat])delete p.forecast.expenses[cat][key];
    });
  }
  save();
}
function ensureForecast(p){
  if(!p.forecast)p.forecast={labor:{},expenses:{}};
  if(!p.forecast.labor)p.forecast.labor={};
  if(!p.forecast.expenses)p.forecast.expenses={};
  if(!p.expenses1T&&p.expenses1T!==0)p.expenses1T=0;
  return p.forecast;
}
function getFcLaborVal(p,resName,monthKey){var fc=ensureForecast(p);return(fc.labor[resName]&&fc.labor[resName][monthKey])||0;}
function setFcLaborVal(p,resName,monthKey,hours){var fc=ensureForecast(p);if(!fc.labor[resName])fc.labor[resName]={};fc.labor[resName][monthKey]=hours;save();}
function getFcExpVal(p,cat,monthKey){var fc=ensureForecast(p);return(fc.expenses[cat]&&fc.expenses[cat][monthKey])||0;}
function setFcExpVal(p,cat,monthKey,val){var fc=ensureForecast(p);if(!fc.expenses[cat])fc.expenses[cat]={};fc.expenses[cat][monthKey]=val;save();}

/* Horas planejadas = soma do Resource Load (forecast labor) */
function calcPlannedHours(p,resName){
  var fc=ensureForecast(p);var total=0;
  if(fc.labor[resName]){var mk=fc.labor[resName];Object.keys(mk).forEach(function(k){total+=mk[k]||0;});}
  return total;
}

function exportBackup(){
  var data={version:"2.9",date:new Date().toISOString(),projects:S.projects,resources:RES};
  var json=JSON.stringify(data,null,2);
  var blob=new Blob([json],{type:"application/json"});
  var url=URL.createObjectURL(blob);
  var a=document.createElement("a");
  a.href=url;a.download="HorasCusto_backup_"+new Date().toISOString().slice(0,10)+".json";
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  toast("Backup exportado com sucesso!");
}
function importBackup(){
  var fi=document.createElement("input");fi.type="file";fi.accept=".json";
  fi.onchange=function(e){
    var f=e.target.files[0];if(!f)return;
    var r=new FileReader();r.onload=function(ev){
      try{
        var data=JSON.parse(ev.target.result);
        if(!data.projects||!Array.isArray(data.projects)){toast("Arquivo inválido: sem projetos","error");return;}
        if(!confirm("Restaurar backup de "+new Date(data.date).toLocaleDateString("pt-BR")+"?\n\n"+data.projects.length+" projetos e "+(data.resources?data.resources.length:0)+" recursos serão carregados.\n\n⚠ Os dados atuais serão SUBSTITUÍDOS."))return;
        S.projects=data.projects;save();
        if(data.resources&&Array.isArray(data.resources)){RES=data.resources;saveRes();}
        render();toast("Backup restaurado! "+data.projects.length+" projetos carregados.");
      }catch(err){toast("Erro ao ler backup: "+err.message,"error");}
    };r.readAsText(f);
  };fi.click();
}
function stats(p){var ph=0,ch=0,pc=0,cc=0;p.resources.forEach(function(r){var hp=calcPlannedHours(p,r.name);ph+=hp;ch+=r.hc||0;pc+=hp*r.rate;cc+=(r.hc||0)*r.rate;});var sold=p.sold||0,saldo=sold-cc,ref=sold||pc||1,health=cc/ref>1?"bad":cc/ref>.8?"warn":"good";return{ph:ph,ch:ch,pc:pc,cc:cc,sold:sold,saldo:saldo,health:health};}

function doImport(pid,data,fn){
  var parsed;try{parsed=parseXL(data);}catch(e){toast("Erro: "+e.message,"error");return;}
  if(!parsed||!parsed.length){toast("Nenhum dado de horas encontrado.","error");return;}
  var p=S.projects.find(function(x){return x.id===pid;});if(!p)return;
  var summary=[],nc=0,uc=0;
  parsed.forEach(function(imp){var ex=p.resources.find(function(r){return r.name===imp.resourceName;});var prev=ex?ex.hc||0:0;if(ex){ex.hc=imp.hours;uc++;summary.push({name:imp.resourceName,hours:imp.hours,prev:prev,cost:imp.hours*imp.rate,rate:imp.rate,role:ex.role,matched:imp.matched,st:"upd"});}else{p.resources.push({name:imp.resourceName,rate:imp.rate,role:imp.role,hp:0,hc:imp.hours,matched:imp.matched});nc++;summary.push({name:imp.resourceName,hours:imp.hours,prev:0,cost:imp.hours*imp.rate,rate:imp.rate,role:imp.role,matched:imp.matched,st:"new"});}});
  summary.sort(function(a,b){if(a.st!==b.st)return a.st==="new"?-1:1;return b.hours-a.hours;});
  if(!p.imports)p.imports=[];var th=parsed.reduce(function(s,r){return s+r.hours;},0);var tc=parsed.reduce(function(s,r){return s+r.hours*r.rate;},0);
  p.imports.push({fn:fn,date:new Date().toISOString(),rec:parsed.length,th:th,tc:tc,nc:nc,uc:uc});save();
  S.ir={summary:summary,fn:fn,nc:nc,uc:uc,th:th,tc:tc,um:summary.filter(function(x){return !x.matched;}).length};S.modal="imp";render();
}

/* ===== RESOURCE CRUD ===== */
function addResource(name,role,rate){
  if(!name.trim())return;
  var exists=RES.find(function(r){return r.name.toLowerCase()===name.trim().toLowerCase();});
  if(exists){toast("Recurso já existe!","error");return;}
  RES.push({name:name.trim(),role:(role||"").trim().toUpperCase(),rate:parseFloat(rate)||0});
  RES.sort(function(a,b){return a.name.localeCompare(b.name);});
  saveRes();toast("Recurso adicionado!");
}
function updateResource(oldName,name,role,rate){
  var idx=RES.findIndex(function(r){return r.name===oldName;});
  if(idx<0)return;
  var newName=name.trim();var newRole=(role||"").trim().toUpperCase();var newRate=parseFloat(rate)||0;
  // update in all projects
  if(oldName!==newName||RES[idx].rate!==newRate||RES[idx].role!==newRole){
    S.projects.forEach(function(p){p.resources.forEach(function(r){if(r.name===oldName){r.name=newName;r.rate=newRate;r.role=newRole;}});});save();
  }
  RES[idx]={name:newName,role:newRole,rate:newRate};
  RES.sort(function(a,b){return a.name.localeCompare(b.name);});
  saveRes();toast("Recurso atualizado!");
}
function deleteResource(name){
  RES=RES.filter(function(r){return r.name!==name;});
  // remove from projects too
  S.projects.forEach(function(p){p.resources=p.resources.filter(function(r){return r.name!==name;});});
  save();saveRes();toast("Recurso removido!");
}
